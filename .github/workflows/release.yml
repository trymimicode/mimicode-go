name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.26'

    - name: Run tests
      run: go test -v ./...

    - name: Build release binaries
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        COMMIT=$(git rev-parse --short HEAD)
        BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
        LDFLAGS="-s -w -X main.version=$VERSION -X main.commit=$COMMIT -X main.buildDate=$BUILD_DATE"
        
        # Linux amd64
        GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o mimicode-linux-amd64 ./cmd/mimicode
        
        # Linux arm64
        GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o mimicode-linux-arm64 ./cmd/mimicode
        
        # macOS amd64
        GOOS=darwin GOARCH=amd64 go build -trimpath -ldflags="$LDFLAGS" -o mimicode-darwin-amd64 ./cmd/mimicode
        
        # macOS arm64
        GOOS=darwin GOARCH=arm64 go build -trimpath -ldflags="$LDFLAGS" -o mimicode-darwin-arm64 ./cmd/mimicode
        
        # Create checksums
        sha256sum mimicode-* > checksums.txt

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          mimicode-linux-amd64
          mimicode-linux-arm64
          mimicode-darwin-amd64
          mimicode-darwin-arm64
          checksums.txt
        body: |
          ## Installation

          **Quick install**:
          ```sh
          curl -fsSL https://raw.githubusercontent.com/trymimicode/mimicode-go/main/install.sh | bash
          ```

          **Or download a binary**:
          - Linux x86_64: `mimicode-linux-amd64`
          - Linux ARM64: `mimicode-linux-arm64`
          - macOS x86_64: `mimicode-darwin-amd64`
          - macOS ARM64 (M1/M2): `mimicode-darwin-arm64`

          Download, rename to `mimicode`, make executable (`chmod +x mimicode`), and move to your PATH.

          ## What's Changed
          See commits for details.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
